{% extends "base.html" %}

{% block title %}Chat with Sophia{% endblock %}
{% block body_class %}chat-body{% endblock %}

{% block header_extra %}
  <button type="button" class="btn btn-ghost menu-toggle" id="menu-toggle" aria-label="Toggle conversations" aria-expanded="false">Conversations</button>
{% endblock %}

{% block content %}
<div class="chat-shell">

  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-head">
      <button type="button" class="btn btn-ghost" id="new-conversation">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        New conversation
      </button>
    </div>
    <ul class="conversation-list" id="conversation-list" aria-label="Your conversations"></ul>
    <div class="sidebar-foot">
      <button type="button" class="btn btn-signout" id="signout">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M16 17l5-5-5-5M21 12H9M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <section class="conversation glass">
    <div class="thread" id="thread" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <span class="orb orb-lg" data-state="idle" aria-hidden="true"></span>
        <p>Ask Sophia anything.</p>
        <div class="example-chips">
          <button type="button" class="chip">What does Lao Tzu say about water?</button>
          <button type="button" class="chip">How do the Stoics define a good life?</button>
          <button type="button" class="chip">What is the relationship between mind and reality?</button>
        </div>
      </div>
    </div>

    <form class="composer" id="composer">
      <label class="visually-hidden" for="message" hidden>Your message to Sophia</label>
      <textarea id="message" name="message" rows="1"
                placeholder="Speak to Sophia…" aria-label="Your message to Sophia"></textarea>
      <button type="submit" class="btn-send" id="send" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </form>
  </section>

</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/chat.js"></script>
{% endblock %}
